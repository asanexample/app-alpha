# prod resource bump (real per-stage delta): higher requests/limits for production load.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-alpha
spec:
  template:
    spec:
      containers:
        - name: app-alpha
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
