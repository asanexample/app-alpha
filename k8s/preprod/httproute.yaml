apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-alpha
  namespace: team-alpha
spec:
  parentRefs:
    - name: preprod-gateway
      namespace: default
      sectionName: https
  hostnames:
    - demo.preprod.aws.refplat.org
  rules:
    - backendRefs:
        - name: app-alpha
          port: 80
