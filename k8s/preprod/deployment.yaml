apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-alpha
  namespace: team-alpha
  labels:
    app: app-alpha
    app.kubernetes.io/name: app-alpha
    team: alpha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-alpha
  template:
    metadata:
      labels:
        app: app-alpha
        app.kubernetes.io/name: app-alpha
        team: alpha
    spec:
      # App does not talk to the Kubernetes API — drop the SA token (least privilege).
      # Required by the platform Kyverno policy restrict-automount-sa-token.
      automountServiceAccountToken: false
      containers:
        - name: app-alpha
          image: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/demo@sha256:c38fff61f66b4cad6d8ec325b2d6e72820a23b0180b7bcb99f4db4e99f7725ab
          ports:
            - containerPort: 8080
          env:
            - name: VERSION
              value: "44ec482dfc63f986fb760e7f5d9894d1a7c9d0d9"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
