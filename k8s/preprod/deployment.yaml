apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-alpha
  namespace: team-alpha
  labels:
    app: app-alpha
    app.kubernetes.io/name: app-alpha
    team: alpha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-alpha
  template:
    metadata:
      labels:
        app: app-alpha
        app.kubernetes.io/name: app-alpha
        team: alpha
    spec:
      # Pod Identity binds AWS creds to this named SA (platform association, ADR-041).
      serviceAccountName: app-alpha
      # App does not talk to the Kubernetes API — drop the SA token (least privilege). Pod Identity
      # injects its OWN projected token, so this does not affect AWS access.
      # Required by the platform Kyverno policy restrict-automount-sa-token.
      automountServiceAccountToken: false
      containers:
        - name: app-alpha
          image: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/demo@sha256:05e8d3d34f393713ffff36618c1c9c83774a3d2bee8a036d08f58cffd98016c2
          ports:
            - containerPort: 8080
          env:
            - name: VERSION
              value: "b179178f99401fb14a4e33921ae03333df4ab5cb"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Team S3 bucket (read via Pod Identity). AWS_REGION lets the SDK pick the endpoint; creds
            # come from the Pod Identity agent, not this config.
            - name: DATA_BUCKET
              value: "asanexample-team-alpha-data"
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
