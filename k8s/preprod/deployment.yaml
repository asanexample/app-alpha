apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-alpha
  namespace: team-alpha
  labels:
    app: app-alpha
    app.kubernetes.io/name: app-alpha
    team: alpha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-alpha
  template:
    metadata:
      labels:
        app: app-alpha
        app.kubernetes.io/name: app-alpha
        team: alpha
    spec:
      # App does not talk to the Kubernetes API — drop the SA token (least privilege).
      # Required by the platform Kyverno policy restrict-automount-sa-token.
      automountServiceAccountToken: false
      containers:
        - name: app-alpha
          image: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/demo@sha256:d60ea8497e084e179c05c49e5c16a8983e8366df3d32168e8a9d2d07ada08fa3
          ports:
            - containerPort: 8080
          env:
            - name: VERSION
              value: "75cb501fd937ebff5334580b950e466f898f619a"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
