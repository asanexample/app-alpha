apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-alpha
  namespace: team-alpha
  labels:
    app: app-alpha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-alpha
  template:
    metadata:
      labels:
        app: app-alpha
    spec:
      containers:
        - name: app-alpha
          image: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/demo:e8a90a2379091f8603e186e25e658846f2156b74
          ports:
            - containerPort: 8080
          env:
            - name: VERSION
              value: "e8a90a2379091f8603e186e25e658846f2156b74"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
