# Named ServiceAccount the app's pods run as. AWS access is granted out-of-band by a platform-managed
# EKS Pod Identity association binding (preprod-use1-eks, team-alpha, app-alpha) -> the team-alpha role
# (platform ADR-041). Deliberately NO eks.amazonaws.com/role-arn annotation (that's IRSA, and is denied
# in tenant namespaces).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-alpha
  namespace: team-alpha
  labels:
    app.kubernetes.io/name: app-alpha
