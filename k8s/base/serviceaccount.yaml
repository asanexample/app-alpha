# Named ServiceAccount the app's pods run as. AWS access is granted out-of-band by a platform-managed EKS
# Pod Identity association (declared in the Environment claim's services.<svc>.permissions.aws) -> the
# per-service Pod-<team>-<product>-<stage>-<service> role (ADR-041/067). Deliberately NO
# eks.amazonaws.com/role-arn annotation (that's IRSA, denied in tenant namespaces).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-alpha
  labels:
    app.kubernetes.io/name: app-alpha
