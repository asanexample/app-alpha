name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write

env:
  ECR_REGISTRY: 829808296602.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO: team-alpha/demo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'deploy:')"
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::829808296602:role/github-actions-ecr-push-alpha
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing via this workflow's GitHub OIDC identity (Fulcio + Rekor). Kyverno's
      # verify-images policy admits only images signed by this exact workflow. Sign by DIGEST and
      # BEFORE the manifest commit so the signature exists in ECR before ArgoCD admits the pod.
      - name: Sign image (cosign keyless)
        run: cosign sign --yes "${ECR_REGISTRY}/${ECR_REPO}@${{ steps.build.outputs.digest }}"

      - name: Update manifests (pin to signed digest)
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          sed -i "s|image: .*|image: ${ECR_REGISTRY}/${ECR_REPO}@${DIGEST}|" k8s/preprod/deployment.yaml
          sed -i "s|value: \".*\"|value: \"${{ github.sha }}\"|" k8s/preprod/deployment.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/preprod/deployment.yaml
          git diff --cached --quiet || git commit -m "deploy: update image to ${{ github.sha }}"
          git push
