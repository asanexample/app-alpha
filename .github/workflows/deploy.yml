name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write

env:
  ECR_REGISTRY: 829808296602.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO: team-alpha/demo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'deploy:')"
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::829808296602:role/github-actions-ecr-push-alpha
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          # Pin cosign v2: legacy `.att` attestation format, which Kyverno's default attestor
          # verifies. cosign v3's new bundle/referrers format needs Kyverno's opt-in
          # `type: SigstoreBundle` — a separate, coordinated migration (#114 notes).
          cosign-release: "v2.5.2"

      # Keyless signing via this workflow's GitHub OIDC identity (Fulcio + Rekor). Kyverno's
      # verify-images policy admits only images signed by this exact workflow. Sign by DIGEST and
      # BEFORE the manifest commit so the signature exists in ECR before ArgoCD admits the pod.
      - name: Sign image (cosign keyless)
        run: cosign sign --yes "${ECR_REGISTRY}/${ECR_REPO}@${{ steps.build.outputs.digest }}"

      # Software Bill of Materials (platform #108 / 108b). Syft generates a CycloneDX SBOM from
      # the pushed image; cosign attaches it as a keyless-signed attestation (same OIDC identity
      # as the signature). Kyverno's verify-attestation policy (#115) will require it at admission.
      - name: Install Syft (download release binary + verify SHA-256)
        env:
          SYFT_VERSION: "1.44.0" # latest stable; verify before bumping
        run: |
          base="https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}"
          asset="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl -sfL "${base}/${asset}" -o "${asset}"
          curl -sfL "${base}/syft_${SYFT_VERSION}_checksums.txt" -o syft_checksums.txt
          grep " ${asset}\$" syft_checksums.txt | sha256sum -c -
          tar xzf "${asset}" syft
          sudo install -m 0755 syft /usr/local/bin/syft
          rm -f syft "${asset}" syft_checksums.txt
          syft --version

      - name: Generate + attest SBOM (CycloneDX, cosign keyless)
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPO}@${{ steps.build.outputs.digest }}"
          syft "$IMAGE" -o cyclonedx-json=sbom.cdx.json
          cosign attest --yes --type cyclonedx --predicate sbom.cdx.json "$IMAGE"

      # SLSA build provenance (platform #108 / 108c). A second cosign attest on the same image —
      # works now that the team ECR repos use IMMUTABLE_WITH_EXCLUSION (cosign's sha256-*.att tag
      # is mutable so it can hold both attestations; image tags stay immutable — platform #114).
      # Records where/how the image was built as a SLSA v0.2 predicate, keyless (legacy `.att`).
      - name: Generate + attest SLSA provenance (cosign keyless)
        # ${{ }} via env (github.ref et al. are attacker-controllable) — avoids the
        # shell-injection class (semgrep run-shell-injection), consistent with #112.
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPO}@${DIGEST}"
          SRC="git+${SERVER_URL}/${REPO}@${REF}"
          cat > provenance.json <<JSON
          {
            "builder": { "id": "${SERVER_URL}/${REPO}/.github/workflows/deploy.yml@${REF}" },
            "buildType": "https://github.com/asanexample/platform/build-types/github-actions-docker@v1",
            "invocation": {
              "configSource": {
                "uri": "${SRC}",
                "digest": { "sha1": "${SHA}" },
                "entryPoint": ".github/workflows/deploy.yml"
              },
              "environment": { "github_run_id": "${RUN_ID}", "github_run_attempt": "${RUN_ATTEMPT}" }
            },
            "metadata": {
              "buildInvocationId": "${RUN_ID}-${RUN_ATTEMPT}",
              "completeness": { "parameters": true, "environment": false, "materials": false },
              "reproducible": false
            },
            "materials": [
              { "uri": "${SRC}", "digest": { "sha1": "${SHA}" } }
            ]
          }
          JSON
          cosign attest --yes --type slsaprovenance --predicate provenance.json "$IMAGE"

      - name: Update manifests (pin to signed digest)
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          sed -i "s|image: .*|image: ${ECR_REGISTRY}/${ECR_REPO}@${DIGEST}|" k8s/preprod/deployment.yaml
          # Update ONLY the VERSION env value (the line after `- name: VERSION`). A bare
          # `s|value: ".*"|...|` would clobber every other env value (DATA_BUCKET, AWS_REGION, ...).
          sed -i "/- name: VERSION/{n;s|value: \".*\"|value: \"${{ github.sha }}\"|}" k8s/preprod/deployment.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/preprod/deployment.yaml
          git diff --cached --quiet || git commit -m "deploy: update image to ${{ github.sha }}"
          git push
