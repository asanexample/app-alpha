name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write

env:
  ECR_REGISTRY: 829808296602.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO: team-alpha/demo

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'deploy:')"
    permissions:
      id-token: write # OIDC: AWS (ECR push) + cosign keyless signing
      contents: read
    # Surfaced to the provenance + deploy jobs. NOTE: workflow-level `env` is NOT available in
    # job `outputs:`, so the image ref is surfaced via a step output (steps.img), not ${{ env.* }}.
    outputs:
      image: ${{ steps.img.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::829808296602:role/github-actions-ecr-push-alpha
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}

      - name: Expose image ref for the provenance + deploy jobs
        id: img
        run: echo "image=${ECR_REGISTRY}/${ECR_REPO}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          # Pin cosign v2: legacy `.att` attestation format, which Kyverno's default attestor
          # verifies. cosign v3's new bundle/referrers format needs Kyverno's opt-in
          # `type: SigstoreBundle` — a separate, coordinated migration (#114 notes).
          cosign-release: "v2.5.2"

      # Keyless signing via this workflow's GitHub OIDC identity (Fulcio + Rekor). Kyverno's
      # verify-images policy admits only images signed by this exact workflow. Sign by DIGEST.
      - name: Sign image (cosign keyless)
        run: cosign sign --yes "${ECR_REGISTRY}/${ECR_REPO}@${{ steps.build.outputs.digest }}"

      # Software Bill of Materials (platform #108 / 108b). Syft generates a CycloneDX SBOM from
      # the pushed image; cosign attaches it as a keyless-signed attestation (same OIDC identity
      # as the signature). Kyverno's verify-attestations policy requires the SBOM at admission.
      - name: Install Syft (download release binary + verify SHA-256)
        env:
          SYFT_VERSION: "1.44.0" # latest stable; verify before bumping
        run: |
          base="https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}"
          asset="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl -sfL "${base}/${asset}" -o "${asset}"
          curl -sfL "${base}/syft_${SYFT_VERSION}_checksums.txt" -o syft_checksums.txt
          grep " ${asset}\$" syft_checksums.txt | sha256sum -c -
          tar xzf "${asset}" syft
          sudo install -m 0755 syft /usr/local/bin/syft
          rm -f syft "${asset}" syft_checksums.txt
          syft --version

      - name: Generate + attest SBOM (CycloneDX, cosign keyless)
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPO}@${{ steps.build.outputs.digest }}"
          syft "$IMAGE" -o cyclonedx-json=sbom.cdx.json
          cosign attest --yes --type cyclonedx --predicate sbom.cdx.json "$IMAGE"

  # SLSA Build L3 (platform #131, ADR-042): the SOLE provenance attestation, signed by the isolated
  # asanexample/trusted-ci reusable workflow whose identity this app's build job cannot forge. The
  # app no longer hand-authors provenance — a job signing provenance it wrote about itself proves
  # nothing, and a second slsaprovenance attestation of a different identity breaks Kyverno's
  # single-identity attestation match (verifiedCount:0). trusted-ci is now the only provenance source.
  provenance:
    needs: build
    permissions:
      id-token: write
      contents: read
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@5e8a6b33515767cb80429d9e1831ab5143b5c477
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}

  # Pin the deploy manifest to the freshly-built digest and commit. Gated on BOTH build and
  # provenance so the digest ArgoCD picks up already carries its signature, SBOM AND trusted-ci
  # provenance — there is no window where ArgoCD sees an image whose provenance attestation does not
  # yet exist, which is what would otherwise make Kyverno's Enforce verify-attestations reject it.
  deploy:
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update manifests (pin to signed digest)
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          sed -i "s|image: .*|image: ${IMAGE}@${DIGEST}|" k8s/preprod/deployment.yaml
          # Update ONLY the VERSION env value (the line after `- name: VERSION`). A bare
          # `s|value: ".*"|...|` would clobber every other env value (DATA_BUCKET, AWS_REGION, ...).
          sed -i "/- name: VERSION/{n;s|value: \".*\"|value: \"${{ github.sha }}\"|}" k8s/preprod/deployment.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/preprod/deployment.yaml
          git diff --cached --quiet || git commit -m "deploy: update image to ${{ github.sha }}"
          git push
