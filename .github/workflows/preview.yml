name: PR Preview

# Thin caller (same shared build-sign + slsa-provenance siblings as deploy.yml, but no deploy/commit job).
# Builds + signs + provenances a PR image so previews satisfy the same Kyverno verify-images /
# verify-attestations checks (alpha has preview: true, so the preview ApplicationSet deploys these).
# Fork PRs get no OIDC token, so they fail closed (cannot push) — by design.

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    permissions:
      id-token: write
      contents: read
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@61c9f4b56859a85e5d7fedf2db7489dfa446caed
    with:
      app: demo
      tag: ${{ github.event.pull_request.head.sha }}

  provenance:
    needs: build
    permissions:
      id-token: write
      contents: read
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@70fc4ba48c7aa66e988ca2d30c2327a2d98f49e7
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
