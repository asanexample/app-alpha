name: PR Preview

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  id-token: write
  contents: read

env:
  ECR_REGISTRY: 829808296602.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO: team-alpha/demo

jobs:
  build:
    runs-on: ubuntu-latest
    # Exposed for the isolated provenance job. `env` is not available in job `outputs:`, so the
    # image ref is surfaced via a step output (steps.img).
    outputs:
      image: ${{ steps.img.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::829808296602:role/github-actions-ecr-push-alpha
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.event.pull_request.head.sha }}

      - name: Expose image ref for the provenance job
        id: img
        run: echo "image=${ECR_REGISTRY}/${ECR_REPO}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          # Pin cosign v2 (legacy `.att` format Kyverno's default attestor verifies) — same as deploy.yml.
          cosign-release: "v2.5.2"

      # Keyless signing via this PR workflow's GitHub OIDC identity. The verify-images policy matches
      # preview.yml by subjectRegExp (the OIDC ref differs per PR), so previews verify too.
      - name: Sign image (cosign keyless)
        run: cosign sign --yes "${ECR_REGISTRY}/${ECR_REPO}@${{ steps.build.outputs.digest }}"

      # SBOM + SLSA provenance attestations (platform #108 / 108b+108c) — same as deploy.yml, so PR
      # previews satisfy the verify-attestations policy (which matches preview.yml by subjectRegExp).
      - name: Install Syft (download release binary + verify SHA-256)
        env:
          SYFT_VERSION: "1.44.0" # latest stable; verify before bumping
        run: |
          base="https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}"
          asset="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl -sfL "${base}/${asset}" -o "${asset}"
          curl -sfL "${base}/syft_${SYFT_VERSION}_checksums.txt" -o syft_checksums.txt
          grep " ${asset}\$" syft_checksums.txt | sha256sum -c -
          tar xzf "${asset}" syft
          sudo install -m 0755 syft /usr/local/bin/syft
          rm -f syft "${asset}" syft_checksums.txt
          syft --version

      - name: Generate + attest SBOM (CycloneDX, cosign keyless)
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPO}@${{ steps.build.outputs.digest }}"
          syft "$IMAGE" -o cyclonedx-json=sbom.cdx.json
          cosign attest --yes --type cyclonedx --predicate sbom.cdx.json "$IMAGE"

      - name: Generate + attest SLSA provenance (cosign keyless)
        # ${{ }} via env (github.ref et al. are attacker-controllable) — avoids shell injection (#112).
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPO}@${DIGEST}"
          SRC="git+${SERVER_URL}/${REPO}@${REF}"
          cat > provenance.json <<JSON
          {
            "builder": { "id": "${SERVER_URL}/${REPO}/.github/workflows/preview.yml@${REF}" },
            "buildType": "https://github.com/asanexample/platform/build-types/github-actions-docker@v1",
            "invocation": {
              "configSource": {
                "uri": "${SRC}",
                "digest": { "sha1": "${SHA}" },
                "entryPoint": ".github/workflows/preview.yml"
              },
              "environment": { "github_run_id": "${RUN_ID}", "github_run_attempt": "${RUN_ATTEMPT}" }
            },
            "metadata": {
              "buildInvocationId": "${RUN_ID}-${RUN_ATTEMPT}",
              "completeness": { "parameters": true, "environment": false, "materials": false },
              "reproducible": false
            },
            "materials": [
              { "uri": "${SRC}", "digest": { "sha1": "${SHA}" } }
            ]
          }
          JSON
          cosign attest --yes --type slsaprovenance --predicate provenance.json "$IMAGE"

  # SLSA Build L3 (platform #131, ADR-042): isolated provenance from trusted-ci, alongside the
  # hand-authored one (dual provenance). The PR-preview run is also the empirical gate that the
  # signer identity is trusted-ci (not app-alpha) before this lands on main.
  provenance:
    needs: build
    permissions:
      id-token: write
      contents: read
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@10a29f41c20ec30d3e1b2665d98e5656a9a4553f
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
